name: CI and Publish (ko)

env:
  KO_TAGS: latest,${{ github.sha }}

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.15.0

      - name: Run tests
        run: devbox run make test

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image repository
        if: github.event_name == 'push'
        id: repo
        shell: bash
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Publish image with ko
        if: github.event_name == 'push'
        env:
          KO_DOCKER_REPO: ${{ steps.repo.outputs.value }}
        run: devbox run make image
